name: Python package

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    permissions:
      checks: write
      contents: read
      pull-requests: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.11"
          python-version: "3.11"
          enable-cache: true

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=src" >> $GITHUB_ENV

      - name: Install dependencies (uv)
        run: uv sync --locked --dev

      - name: Run pre-commit (ruff + mypy)
        run: uv run pre-commit run --all-files

  test:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - AIRFLOW_VERSION: 'airflow2'
            python-version: '3.11'
          - AIRFLOW_VERSION: 'airflow3'
            python-version: '3.11'
          - AIRFLOW_VERSION: 'airflow3'
            python-version: '3.12'

    name: test (${{ matrix.AIRFLOW_VERSION }}, python ${{ matrix.python-version }})

    env:
      AIRFLOW_CONN_DATA_LAKE_TEST: '{"conn_type": "aws", "extra": {"endpoint_url": "http://localhost:9090"}}'
      AIRFLOW_CONN_GCP_DATA_LAKE_TEST: '{"conn_type": "google_cloud_platform", "extra": {"key_path": "/.../keyfile.json"}}'
      AIRFLOW_CONN_SFTP_TEST: '{"conn_type": "sftp", "host": "localhost", "port": 2222, "login": "test_user", "password": "pass"}'
      AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      AWS_DEFAULT_REGION: us-east-1
      TEST_BUCKET: data_lake
      S3_ENDPOINT_URL: http://localhost:9090
      AWS_S3_ADDRESSING_STYLE: path
      AWS_USE_EXPECT_HEADER: false

    steps:
      - uses: actions/checkout@v4

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=src" >> $GITHUB_ENV

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.11"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies (uv)
        run: uv sync --locked --dev --extra ${{ matrix.AIRFLOW_VERSION }}

      - name: Initialize database
        run: |
          if [ "${{ matrix.AIRFLOW_VERSION }}" = "airflow3" ]; then
            uv run airflow db migrate
          else
            uv run airflow db reset -y
          fi

      - name: Start S3/Mock server
        run: docker run -d --name test-s3mock --rm -p 9090:9090 -e initialBuckets=data_lake -e debug=true -t adobe/s3mock

      - name: Start SFTP server
        run: docker run -p 2222:22 -d --name test-sftp atmoz/sftp test_user:pass:::root_folder

      - name: Wait for SFTP server to be ready
        run: |
          for i in $(seq 1 15); do
            nc -z localhost 2222 && echo "SFTP ready" && break
            echo "Waiting for SFTP... ($i/15)"
            sleep 2
          done

      - name: Run tests with pytest
        run: >
          uv run pytest  --tb=short tests/
          --doctest-modules
          --junitxml=junit/test-results.xml
          --cov=src
          --cov-report=xml
          --cov-report=html
      - name: Stop S3/Mock server
        if: always()
        run: docker stop test-s3mock || true
      - name: Stop SFTP server
        if: always()
        run: docker stop test-sftp || true
