name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  pypi:
    runs-on: ubuntu-24.04
    # environment: pypi  # uncomment to require manual approval before publishing
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Build distributions
        run: uv build

      - name: Smoke test (wheel import)
        run: |
          WHL=$(ls dist/*.whl | head -1)
          uv run --isolated --no-project --with "${WHL}[airflow3]" python -c "import airflow_toolkit; print('ok')"

      - name: Smoke test (sdist import)
        run: |
          SDIST=$(ls dist/*.tar.gz | head -1)
          uv run --isolated --no-project --with "${SDIST}[airflow3]" python -c "import airflow_toolkit; print('ok')"

      - name: Publish to PyPI
        run: uv publish
