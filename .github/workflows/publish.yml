name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  pypi:
    runs-on: ubuntu-24.04
    # environment: pypi  # uncomment to require manual approval before publishing
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.11

      - name: Build distributions
        run: uv build

      - name: Smoke test (wheel import)
        run: uv run --isolated --no-project --with "dist/*.whl[airflow3]" python -c "import airflow_toolkit; print('ok')"

      - name: Smoke test (sdist import)
        run: uv run --isolated --no-project --with "dist/*.tar.gz[airflow3]" python -c "import airflow_toolkit; print('ok')"

      - name: Publish to PyPI
        run: uv publish
